<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpik - Проверка номеров для Yandex Pay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 40px 20px;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        
        .content { padding: 30px; }
        
        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            font-family: monospace;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results { margin-top: 20px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .phone-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .phone-card.clean { border-color: #28a745; background: #d4edda; }
        .phone-card.occupied { border-color: #ffc107; background: #fff3cd; }
        .phone-card.blocked { border-color: #dc3545; background: #f8d7da; }
        
        .phone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .phone-number {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge.clean { background: #28a745; color: white; }
        .badge.occupied { background: #ffc107; color: #333; }
        .badge.blocked { background: #dc3545; color: white; }
        
        .risk-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .risk-low { background: #d4edda; color: #155724; }
        .risk-medium { background: #fff3cd; color: #856404; }
        .risk-high { background: #f8d7da; color: #721c24; }
        .risk-blocked { background: #dc3545; color: white; }
        
        .recommendation {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
        
        .service-status {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            line-height: 1.6;
        }
        
        .service-status .service-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .service-status .icon {
            font-size: 16px;
        }
        
        .warnings {
            margin-top: 10px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 6px;
            font-size: 13px;
            color: #856404;
        }
        
        .warnings .warning-item {
            margin-bottom: 4px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .help-text {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #555;
        }
        
        .debug-info {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            color: #666;
            word-break: break-all;
        }
        
        .debug-info summary {
            cursor: pointer;
            font-weight: 600;
            color: #495057;
        }
        
        .debug-content {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Helpik</h1>
            <p>Проверка номеров для открытия Yandex Pay</p>
        </div>
        
        <div class="content">
            <div class="help-text">
                Введите номера телефонов (по одному на строке). Система оценит:
                <br>• Можно ли открыть карту Yandex Pay
                <br>• Есть ли риск блокировки
                <br>• Рекомендацию: покупать номер или нет
            </div>
            
            <div class="input-section">
                <label for="phones">Номера телефонов:</label>
                <textarea id="phones" placeholder="+79001234567&#10;+79007654321&#10;+79161234567"></textarea>
                <button class="btn" onclick="checkPhones()" id="checkBtn">Проверить номера</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Проверяем номера...</p>
            </div>
            
            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        async function checkPhones() {
            const textarea = document.getElementById('phones');
            const btn = document.getElementById('checkBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            const phones = textarea.value.split('\n').filter(p => p.trim());
            
            if (phones.length === 0) {
                alert('Введите хотя бы один номер');
                return;
            }
            
            btn.disabled = true;
            loading.style.display = 'block';
            results.innerHTML = '';
            
            try {
                const response = await fetch('/api/check-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phones: phones })
                });
                
                const data = await response.json();
                
                const statsHtml = `
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-number">${data.total}</div>
                            <div class="stat-label">Всего</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color: #28a745;">${data.clean}</div>
                            <div class="stat-label">Чистые</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color: #ffc107;">${data.risky}</div>
                            <div class="stat-label">Рискованные</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color: #dc3545;">${data.blocked}</div>
                            <div class="stat-label">Заблокированы</div>
                        </div>
                    </div>
                `;
                
                const phonesHtml = data.results.map(r => {
                    const cardClass = r.is_blocked ? 'blocked' : (r.is_clean ? 'clean' : 'occupied');
                    const badgeClass = r.is_blocked ? 'blocked' : (r.is_clean ? 'clean' : 'occupied');
                    const badgeText = r.is_blocked ? 'ЗАБЛОКИРОВАН' : (r.is_clean ? '✅ ЧИСТЫЙ' : '⚠️ ЗАНЯТ');
                    
                    const riskClass = r.risk_level === 'low' ? 'risk-low' : 
                                     (r.risk_level === 'medium' ? 'risk-medium' : 
                                     (r.risk_level === 'blocked' ? 'risk-blocked' : 'risk-high'));
                    const riskText = r.risk_level === 'low' ? '✓ Низкий риск' : 
                                    (r.risk_level === 'medium' ? '⚠️ Средний риск' : 
                                    (r.risk_level === 'blocked' ? '❌ Блокировка' : '❌ Высокий риск'));
                    
                    const yandexIdIcon = r.has_yandex_id ? '❌' : '✅';
                    const yoomoneyIcon = r.has_yoomoney ? '❌' : '✅';
                    
                    const warningsHtml = r.warnings && r.warnings.length > 0 ? 
                        `<div class="warnings">${r.warnings.map(w => `<div class="warning-item">⚠️ ${w}</div>`).join('')}</div>` : '';
                    
                    return `
                    <div class="phone-card ${cardClass}">
                        <div class="phone-header">
                            <span class="phone-number">${r.phone}</span>
                            <span class="badge ${badgeClass}">${badgeText}</span>
                        </div>
                        
                        <div class="risk-indicator ${riskClass}">
                            ${riskText} ${r.risk_score > 0 ? `(риск ${r.risk_score}%)` : ''}
                        </div>
                        
                        <div class="service-status">
                            <div class="service-item">
                                <span class="icon">${yandexIdIcon}</span>
                                <span>Yandex ID: ${r.has_yandex_id ? 'есть' : 'нет'}</span>
                            </div>
                            <div class="service-item">
                                <span class="icon">${yoomoneyIcon}</span>
                                <span>ЮMoney: ${r.has_yoomoney ? 'есть' : 'нет'}</span>
                            </div>
                        </div>
                        
                        ${warningsHtml}
                        
                        <div class="recommendation" style="background: ${r.can_open_card ? '#d4edda' : '#f8d7da'}; color: ${r.can_open_card ? '#155724' : '#721c24'};">
                            ${r.recommendation}
                        </div>
                        
                        ${r.debug ? `
                        <details class="debug-info">
                            <summary>🔧 Debug</summary>
                            <div class="debug-content">
                                <strong>Yandex ID:</strong><br>
                                ${JSON.stringify(r.debug.yandex_id, null, 2)}<br>
                                <hr style="margin: 8px 0;">
                                <strong>ЮMoney:</strong><br>
                                ${JSON.stringify(r.debug.yoomoney, null, 2)}
                            </div>
                        </details>
                        ` : ''}
                    </div>
                `}).join('');
                
                results.innerHTML = statsHtml + phonesHtml;
                
            } catch (error) {
                results.innerHTML = `<div style="color: #dc3545; text-align: center;">Ошибка: ${error.message}</div>`;
            }
            
            loading.style.display = 'none';
            btn.disabled = false;
        }
    </script>
</body>
</html>
