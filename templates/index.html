<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpik - Проверка номеров</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 40px 20px;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        
        .content { padding: 30px; }
        
        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            font-family: monospace;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results { margin-top: 20px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .phone-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .phone-card.clean { border-color: #28a745; background: #d4edda; }
        .phone-card.occupied { border-color: #dc3545; background: #f8d7da; }
        
        .phone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .phone-number {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge.clean { background: #28a745; color: white; }
        .badge.occupied { background: #dc3545; color: white; }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .help-text {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #555;
        }
        
        /* Стили для debug */
        .debug-info {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            color: #666;
            word-break: break-all;
        }
        
        .debug-info summary {
            cursor: pointer;
            font-weight: 600;
            color: #495057;
        }
        
        .debug-content {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Helpik</h1>
            <p>Проверка купленных номеров на привязку к Яндекс Pay / ЮMoney</p>
        </div>
        
        <div class="content">
            <div class="help-text">
                Введите номера телефонов (по одному на строку). Система проверит, не привязан ли к ним чужой кошелёк ЮMoney.
            </div>
            
            <div class="input-section">
                <label for="phones">Номера телефонов:</label>
                <textarea id="phones" placeholder="+79001234567&#10;+79007654321&#10;+79161234567"></textarea>
                <button class="btn" onclick="checkPhones()" id="checkBtn">Проверить номера</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Проверяем номера...</p>
            </div>
            
            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        async function checkPhones() {
            const textarea = document.getElementById('phones');
            const btn = document.getElementById('checkBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            const phones = textarea.value.split('\n').filter(p => p.trim());
            
            if (phones.length === 0) {
                alert('Введите хотя бы один номер');
                return;
            }
            
            btn.disabled = true;
            loading.style.display = 'block';
            results.innerHTML = '';
            
            try {
                const response = await fetch('/api/check-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phones: phones })
                });
                
                const data = await response.json();
                
                const statsHtml = `
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-number">${data.total}</div>
                            <div class="stat-label">Всего номеров</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color: #28a745;">${data.clean}</div>
                            <div class="stat-label">Чистые</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color: #dc3545;">${data.occupied}</div>
                            <div class="stat-label">Занятые</div>
                        </div>
                    </div>
                `;
                
                const phonesHtml = data.results.map(r => `
                    <div class="phone-card ${r.is_clean ? 'clean' : 'occupied'}">
                        <div class="phone-header">
                            <span class="phone-number">${r.phone}</span>
                            <span class="badge ${r.is_clean ? 'clean' : 'occupied'}">
                                ${r.is_clean ? '✅ ЧИСТЫЙ' : '❌ ЗАНЯТ'}
                            </span>
                        </div>
                        <div style="font-size: 14px; color: #666; margin-top: 10px;">
                            ${r.has_yoomoney ? '• Привязан кошелёк ЮMoney<br>' : '• Кошелёк не привязан'}
                        </div>
                        ${r.debug ? `
                        <details class="debug-info">
                            <summary>🔧 Debug (кликните чтобы развернуть)</summary>
                            <div class="debug-content">
                                <strong>Status:</strong> ${r.debug.status || 'N/A'}<br>
                                <strong>Error:</strong> ${r.debug.error || 'N/A'}<br>
                                <strong>Has contract_amount:</strong> ${r.debug.has_contract_amount}<br>
                                <strong>Has request_id:</strong> ${r.debug.has_request_id}<br>
                                <hr style="margin: 8px 0; border: none; border-top: 1px solid #dee2e6;">
                                <strong>Full response:</strong><br>
                                <pre style="margin-top: 5px; white-space: pre-wrap; word-break: break-all;">${JSON.stringify(r.debug.full_response, null, 2)}</pre>
                            </div>
                        </details>
                        ` : ''}
                    </div>
                `).join('');
                
                results.innerHTML = statsHtml + phonesHtml;
                
            } catch (error) {
                results.innerHTML = `<div style="color: #dc3545; text-align: center;">Ошибка: ${error.message}</div>`;
            }
            
            loading.style.display = 'none';
            btn.disabled = false;
        }
    </script>
</body>
</html>
